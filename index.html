<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模拟箱 - 选择模式</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        onerror="this.href='https://unpkg.com/@fortawesome/fontawesome-free@6.4.0/css/all.min.css'">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        /* 导航页样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f5ff;
            --secondary: #7b2cbf;
            --accent: #ff006e;
            --bg-dark: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --glow-cyan: 0 0 30px rgba(0, 245, 255, 0.4);
            --glow-purple: 0 0 30px rgba(123, 44, 191, 0.4);
            --glow-pink: 0 0 30px rgba(255, 0, 110, 0.4);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.4;
            pointer-events: none;
            animation: float 15s ease-in-out infinite;
        }

        .bg-glow-1 {
            top: -200px;
            right: -100px;
            background: var(--secondary);
        }

        .bg-glow-2 {
            bottom: -200px;
            left: -100px;
            background: var(--primary);
            animation-delay: -7s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 30px) scale(1.1); }
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: particleFloat 20s linear infinite;
        }

        .particle:nth-child(2) { left: 20%; animation-delay: -2s; background: var(--secondary); }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; }
        .particle:nth-child(4) { left: 60%; animation-delay: -6s; background: var(--accent); }
        .particle:nth-child(5) { left: 80%; animation-delay: -8s; background: var(--secondary); }
        .particle:nth-child(6) { left: 90%; animation-delay: -10s; }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        .nav-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 20px 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 标题设计 */
        .nav-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .nav-title::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.1), transparent);
            animation: titleShine 3s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scaleX(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scaleX(1); }
        }

        .nav-title i {
            margin-right: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--primary)); }
        }

        .nav-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--text-muted);
            margin-bottom: 60px;
            letter-spacing: 2px;
            position: relative;
        }

        .nav-subtitle::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 15px auto 0;
        }

        /* 卡片容器 */
        .nav-cards {
            display: flex;
            gap: clamp(20px, 4vw, 40px);
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1100px;
            perspective: 1000px;
        }

        /* 卡片设计 */
        .nav-card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: min(300px, 85vw);
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-color), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--card-color), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--card-color);
            box-shadow: var(--card-glow);
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        .nav-card:hover::after {
            opacity: 0.15;
        }

        /* 卡片图标 */
        .card-icon {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--card-color), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .card-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .nav-card:hover .card-icon::before {
            transform: translateX(100%);
        }

        .nav-card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 40px var(--card-glow-color);
        }

        .nav-card.chat {
            --card-color: #00f5ff;
            --card-glow: var(--glow-cyan);
            --card-glow-color: rgba(0, 245, 255, 0.5);
        }

        .nav-card.werewolf {
            --card-color: #ff006e;
            --card-glow: var(--glow-pink);
            --card-glow-color: rgba(255, 0, 110, 0.5);
        }

        .nav-card.battle {
            --card-color: #7b2cbf;
            --card-glow: var(--glow-purple);
            --card-glow-color: rgba(123, 44, 191, 0.5);
        }

        .nav-card.divination {
            --card-color: #fdcb6e;
            --card-glow: 0 0 30px rgba(253, 203, 110, 0.4);
            --card-glow-color: rgba(253, 203, 110, 0.5);
        }

        .nav-card.analyzer {
            --card-color: #06b6d4;
            --card-glow: 0 0 30px rgba(6, 182, 212, 0.4);
            --card-glow-color: rgba(6, 182, 212, 0.5);
        }

        .nav-card.textgame {
            --card-color: #f97316;
            --card-glow: 0 0 30px rgba(249, 115, 22, 0.4);
            --card-glow-color: rgba(249, 115, 22, 0.5);
        }

        /* 卡片文字 */
        .nav-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            position: relative;
            letter-spacing: 1px;
        }

        .nav-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        /* 卡片箭头 */
        .card-arrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--card-color);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .card-arrow i {
            transition: transform 0.3s ease;
        }

        .nav-card:hover .card-arrow {
            gap: 15px;
        }

        .nav-card:hover .card-arrow i {
            transform: translateX(5px);
        }

        /* 装饰角落 */
        .corner {
            position: fixed;
            width: 150px;
            height: 150px;
            pointer-events: none;
            opacity: 0.3;
        }

        .corner-tl { top: 0; left: 0; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
        .corner-tr { top: 0; right: 0; border-top: 2px solid var(--secondary); border-right: 2px solid var(--secondary); }
        .corner-bl { bottom: 0; left: 0; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
        .corner-br { bottom: 0; right: 0; border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-cards {
                flex-direction: column;
                align-items: center;
            }

            .corner { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="scanline"></div>

        <p class="nav-subtitle">选择你的AI模拟模式</p>
        
        <div class="nav-cards">

                <div class="card-arrow">
                    进入 <i class="fas fa-arrow-right"></i>
                </div>
            </a>
            
            <a href="werewolf/werewolf.html" class="nav-card werewolf">
                <div class="card-icon">

                </div>
                <h3>狼人杀</h3>
                <p>AI角色自动进行狼人杀游戏，支持多种角色和玩法</p>
                <div class="card-arrow">
                    进入 <i class="fas fa-arrow-right"></i>
                </div>
            </a>
            
            <a href="battle/battle.html" class="nav-card battle">
                <div class="card-icon">
                    <i class="fas fa-khanda"></i>
                </div>
                <h3>战斗模拟</h3>
                <p>AI角色进行战斗对决，支持单挑、乱斗、团队战等模式</p>
                <div class="card-arrow">
                    进入 <i class="fas fa-arrow-right"></i>
                </div>
            </a>
            
            <a href="divination/index.html" class="nav-card divination">
                <div class="card-icon">
                    <i class="fas fa-crystal-ball"></i>
                </div>
                <h3>混沌玄卜</h3>
                <p>量子占卜系统，塔罗牌、易经卦象、符文、灵数，AI智能解读</p>
                <div class="card-arrow">
                    进入 <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="analyzer/index.html" class="nav-card analyzer">
                <div class="card-icon">
                    <i class="fas fa-search-plus"></i>
                </div>
                <h3>AI分析工具</h3>
                <p>AI检测回答中的可疑陈述，案例库管理，总结分析功能</p>
                <div class="card-arrow">
                    进入 <i class="fas fa-arrow-right"></i>

            </a>

            <a href="textgame/index.html" class="nav-card textgame">
                <div class="card-icon">

                </div>

                <div class="card-arrow">
                    进入 <i class="fas fa-arrow-right"></i>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
