<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模拟箱 - 多角色对话模拟</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1><i class="fas fa-robot"></i> AI模拟箱</h1>
            <p class="subtitle">多角色AI对话模拟器</p>
        </header>

        <main class="main-content">
            <!-- 左侧：设置面板 -->
            <aside class="settings-panel">
                <!-- AI角色列表 -->
                <section class="panel-section">
                    <div class="section-header">
                        <h2><i class="fas fa-users"></i> AI角色</h2>
                        <div class="generate-controls">
                            <button id="load-cloud-models-btn" class="btn-small btn-cloud" title="一键加载12个云端AI角色" onclick="loadCloudModels()"><i class="fas fa-cloud"></i> 加载云模型</button>
                            <select id="generate-model" class="generate-model-select">
                                <optgroup label="全部模型">
                                    <option value="__random_all__">🔀 随机(全部)</option>
                                    <option value="__random_local__">🏠 随机(本地)</option>
                                    <option value="__random_cloud__">☁️ 随机(云端)</option>
                                </optgroup>
                                <optgroup label="本地模型">
                                    <option value="llama3.1:latest">Llama3.1</option>
                                    <option value="qwen3:8b" selected>Qwen3:8b</option>
                                    <option value="deepseek-r1:8b">DeepSeek-R1:8b</option>
                                    <option value="gemma3:12b">Gemma3:12b</option>
                                    <option value="openchat:latest">OpenChat</option>
                                    <option value="rnj-1:latest">RNJ-1</option>
                                    <option value="olmo-3:latest">OLMo-3</option>
                                    <option value="ministral-3:8b">Ministral-3:8b</option>
                                    <option value="granite4:latest">Granite4</option>
                                </optgroup>
                                <optgroup label="云端模型">
                                    <option value="deepseek-v3.1:671b-cloud">DeepSeek-V3.1</option>
                                    <option value="deepseek-v3.2:cloud">DeepSeek-V3.2</option>
                                    <option value="gpt-oss:120b-cloud">GPT-OSS</option>
                                    <option value="minimax-m2.5:cloud">MiniMax-M2.5</option>
                                    <option value="cogito-2.1:671b-cloud">Cogito-2.1</option>
                                    <option value="mistral-large-3:675b-cloud">Mistral-Large-3</option>
                                    <option value="devstral-2:123b-cloud">Devstral-2</option>
                                    <option value="nemotron-3-nano:30b-cloud">Nemotron-3-Nano</option>
                                    <option value="qwen3.5:397b-cloud">Qwen3.5</option>
                                    <option value="ministral-3:14b-cloud">Ministral-3</option>
                                    <option value="kimi-k2.5:cloud">Kimi-K2.5</option>
                                    <option value="glm-5:cloud">GLM-5</option>
                                </optgroup>
                            </select>
                            <select id="generate-count" class="generate-count-select">
                                <option value="2">2个</option>
                                <option value="3" selected>3个</option>
                                <option value="4">4个</option>
                                <option value="5">5个</option>
                                <option value="6">6个</option>
                            </select>
                            <button id="generate-characters-btn" class="btn-small" title="AI根据背景生成多个角色"><i class="fas fa-magic"></i> 生成</button>
                            <button id="add-character-btn" class="btn-small"><i class="fas fa-plus"></i> 添加</button>
                        </div>
                    </div>
                    <div id="characters-list" class="characters-list">
                        <!-- 角色卡片 -->
                    </div>
                </section>

                <!-- 场景设置 -->
                <section class="panel-section">
                    <h2><i class="fas fa-map"></i> 场景设置</h2>
                    <div class="form-group">
                        <label>背景描述</label>
                        <textarea id="scene-background" rows="4" placeholder="设定故事发生的背景、世界观、场景等..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>讨论主题（可选）</label>
                        <input type="text" id="discussion-topic" placeholder="让AI讨论的话题">
                    </div>
                </section>

                <!-- 运行设置 -->
                <section class="panel-section">
                    <h2><i class="fas fa-cog"></i> 运行设置</h2>
                    <div class="form-group">
                        <label>每轮最大回合数</label>
                        <input type="number" id="max-rounds" value="10" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label>发言间隔（秒）</label>
                        <input type="number" id="interval-seconds" value="2" min="1" max="30">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="wait-user-turn">
                            每轮结束后等待用户发言
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="show-model-info" checked>
                            显示AI模型信息
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="ai-knows-models" checked>
                            AI能看到其他AI模型
                        </label>
                    </div>
                </section>

                <!-- 控制按钮 -->
                <div class="control-buttons">
                    <button id="start-btn" class="btn-primary"><i class="fas fa-play"></i> 开始模拟</button>
                    <button id="pause-btn" class="btn-secondary" disabled><i class="fas fa-pause"></i> 暂停</button>
                    <button id="stop-save-btn" class="btn-warning" disabled><i class="fas fa-save"></i> 停止保存</button>
                    <button id="continue-btn" class="btn-success" disabled><i class="fas fa-play"></i> 继续</button>
                    <button id="stop-btn" class="btn-danger" disabled><i class="fas fa-stop"></i> 停止</button>
                    <button id="clear-btn" class="btn-secondary"><i class="fas fa-trash"></i> 清空</button>
                </div>
                
                <!-- 保存状态提示 -->
                <div id="saved-state-indicator" class="saved-state-indicator" style="display: none;">
                    <i class="fas fa-save"></i> 有保存的状态可以继续
                </div>
            </aside>

            <!-- 右侧：对话区域 -->
            <section class="chat-area">
                <div class="chat-header">
                    <h2><i class="fas fa-comments"></i> 对话记录</h2>
                    <div class="chat-actions">
                        <button id="add-user-msg-btn" class="btn-small"><i class="fas fa-user"></i> 插入用户消息</button>
                        <button id="export-btn" class="btn-small"><i class="fas fa-download"></i> 导出</button>
                        <button id="import-btn" class="btn-small"><i class="fas fa-upload"></i> 导入</button>
                        <button id="clear-btn2" class="btn-small"><i class="fas fa-trash"></i> 清空</button>
                        <input type="file" id="import-file" accept=".md,.json" style="display:none;">
                    </div>
                </div>
                <div id="chat-messages" class="chat-messages">
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>添加AI角色并设置场景后，点击"开始模拟"开始对话</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="user-msg-input" placeholder="输入用户消息..." disabled>
                    <button id="send-user-msg-btn" class="btn-primary" disabled><i class="fas fa-paper-plane"></i></button>
                </div>
            </section>
        </main>
    </div>

    <!-- 添加角色模态框 -->
    <div id="character-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>添加/编辑AI角色</h2>
            <form id="character-form">
                <div class="form-group">
                    <label>角色名称 *</label>
                    <input type="text" id="char-name" required placeholder="如：理性博士">
                </div>
                <div class="form-group">
                    <label>角色描述/性格 *</label>
                    <textarea id="char-description" rows="3" required placeholder="描述角色的性格、说话风格、背景等..."></textarea>
                    <button type="button" class="btn-small" style="margin-top:8px;" onclick="generateCharacter()"><i class="fas fa-magic"></i> AI自动生成</button>
                </div>
                <div class="form-group">
                    <label>AI模型</label>
                    <select id="char-model">
                        <optgroup label="全部模型">
                            <option value="__random_all__">🔀 随机(全部)</option>
                            <option value="__random_local__">🏠 随机(本地)</option>
                            <option value="__random_cloud__">☁️ 随机(云端)</option>
                            <option value="__random_round__">🎲 每轮随机(全部)</option>
                        </optgroup>
                        <optgroup label="本地模型">
                            <option value="llama3.1:latest">Llama3.1</option>
                            <option value="qwen3:8b">Qwen3:8b</option>
                            <option value="deepseek-r1:8b">DeepSeek-R1:8b</option>
                            <option value="gemma3:12b">Gemma3:12b</option>
                            <option value="openchat:latest">OpenChat</option>
                            <option value="rnj-1:latest">RNJ-1</option>
                            <option value="olmo-3:latest">OLMo-3</option>
                            <option value="ministral-3:8b">Ministral-3:8b</option>
                            <option value="granite4:latest">Granite4</option>
                        </optgroup>
                        <optgroup label="云端模型">
                            <option value="deepseek-v3.1:671b-cloud">DeepSeek-V3.1</option>
                            <option value="deepseek-v3.2:cloud">DeepSeek-V3.2</option>
                            <option value="gpt-oss:120b-cloud">GPT-OSS</option>
                            <option value="minimax-m2.5:cloud">MiniMax-M2.5</option>
                            <option value="cogito-2.1:671b-cloud">Cogito-2.1</option>
                            <option value="mistral-large-3:675b-cloud">Mistral-Large-3</option>
                            <option value="devstral-2:123b-cloud">Devstral-2</option>
                            <option value="nemotron-3-nano:30b-cloud">Nemotron-3-Nano</option>
                            <option value="qwen3.5:397b-cloud">Qwen3.5</option>
                            <option value="ministral-3:14b-cloud">Ministral-3</option>
                            <option value="kimi-k2.5:cloud">Kimi-K2.5</option>
                            <option value="glm-5:cloud">GLM-5</option>
                        </optgroup>
                    </select>
                </div>
                <div id="custom-model-group" class="form-group" style="display:none;">
                    <label>自定义模型名称</label>
                    <input type="text" id="char-custom-model" placeholder="如：deepseek-ai/DeepSeek-R1">
                </div>
                <div class="form-group">
                    <label>API端点</label>
                    <input type="text" id="char-endpoint" value="http://localhost:11434/v1" placeholder="http://localhost:11434/v1">
                </div>
                <div class="form-group">
                    <label>API密钥</label>
                    <input type="password" id="char-api-key" value="ollama" placeholder="ollama">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn-primary">保存角色</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 插入用户消息模态框 -->
    <div id="user-msg-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>插入用户消息</h2>
            <div class="form-group">
                <label>消息内容</label>
                <textarea id="user-message-content" rows="4" placeholder="输入你想说的话..."></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeUserMsgModal()">取消</button>
                <button type="button" class="btn-primary" onclick="insertUserMessage()">插入</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
